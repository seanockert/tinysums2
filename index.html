<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tiny Sums - a calculation scratchpad</title>
  <meta name="description" content="A little text area that lets you calculate stuff with natural language">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      scrollbar-gutter: stable;
    }

    :root {
      --font-stack: sans-serif;
      --color-green: hsl(96, 50%, 40%);
      --color-text: hsl(0, 0%, 10%);
      --color-muted: hsl(0, 0%, 60%);
      --color-border: hsl(0, 0%, 90%);
      --color-bg: hsl(0, 0%, 100%);
      --color-hl-comment: hsl(0, 0%, 60%);
      --color-hl-number: hsl(261, 51%, 51%);
      --color-hl-operator: hsl(0, 0%, 53%);
      --color-hl-keyword:hsl(202, 80%, 48%);
      --color-hl-variable: hsl(42, 86%, 51%);
      --color-result-hover-bg: var(--color-green);
      --color-result-active-bg: hsl(96, 50%, 40%);
      --font-size: 1.1rem;
      --line-height: 1.6;
      --padding: 2rem;
      --easing-overshoot: linear(
        0,
        -0.044 9.4%,
        -0.264 26.8%,
        -0.265 34%,
        -0.011 43%,
        0.91 55.2%,
        1.227 63.4%,
        1.276 67.6%,
        1.271 72.2%,
        1.044 90.6%,
        1
      );
    }

    [data-theme="dark"] {
      --color-green: hsl(96, 40%, 60%);
      --color-text: hsl(240, 23%, 90%);
      --color-muted: hsl(240, 23%, 33%);
      --color-border: hsl(240, 23%, 22%);
      --color-bg: hsl(240, 23%, 12%);
      --color-hl-comment: hsl(240, 15%, 50%);
      --color-hl-number: hsl(257, 85%, 79%);
      --color-hl-operator: hsl(240, 43%, 70%);
      --color-result-active-bg: hsl(96, 50%, 60%);
    }

    html {
      font-family: var(--font-stack);
      font-size: clamp(1rem, 1.5vw + 0.5rem, 1.25rem);
      color: var(--color-text);
      background: var(--color-bg);
    }

    body {
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    /* --- Layout --- */
    header {
      padding: 0.5rem var(--padding);
    }

    header h1 {
      font-size: 1rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-green);
    }

    header h1 em {
      font-style: normal;
      font-weight: 400;
    }

    .editor {
      display: grid;
      grid-template-columns: 1fr auto;
    }

    .input-container {
      position: relative;
      flex: 1 1 100%;
      min-width: 0;
    }

    textarea,
    .highlight-layer {
      font-family: var(--font-stack);
      font-size: var(--font-size);
      line-height: var(--line-height);
      padding: var(--padding);
      white-space: pre;
      width: 100%;
      min-height: calc(100vh - 52px);
      border: none;
      outline: none;
      resize: none;
      margin: 0;
      background: transparent;
    }

    textarea {
      position: relative;
      z-index: 2;
      color: transparent;
      caret-color: var(--color-text);
      field-sizing: content;
    }

    .highlight-layer {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
      pointer-events: none;
      color: var(--color-text);
      overflow: hidden;
      mask-image: linear-gradient(to right, black 90%, transparent 100%);
    }

    button {
      all: unset;
      line-height: 1;
      font: inherit;
      cursor: pointer;
      transition: transform 0.25s var(--easing-overshoot), color 0.1s ease-out;
    }

    button:not(:disabled):hover,
    button:not(:disabled):focus-visible {
      transform: scale(1.03);
    }

    button:not(:disabled):active {
      transform: scale(0.97, 1.03);
    }

    .output-container {
      flex: 1 1 30%;
      border-left: 1px solid var(--color-border);
      padding: var(--padding);
      text-align: right;
    }

    .result-line {
      font-family: var(--font-stack);
      font-size: var(--font-size);
      line-height: var(--line-height);
      min-height: calc(var(--font-size) * var(--line-height));
      white-space: nowrap;
    }

    .result-value {
      color: var(--color-green);
      padding: 0 0.4rem;
      border-radius: 0.5rem;
    }

    .result-value:hover {
      background-color: var(--color-result-hover-bg);
      color: var(--color-bg);
    }

    .result-value:active {
      background-color: var(--color-result-active-bg);
      color: var(--color-bg);
    }

    /* --- Syntax highlighting --- */
    .hl-comment  { color: var(--color-hl-comment); font-style: italic; }
    .hl-number   { color: var(--color-hl-number); }
    .hl-keyword  { color: var(--color-hl-keyword); }
    .hl-operator { color: var(--color-hl-operator); }
    .hl-variable { color: var(--color-hl-variable); }

    /* --- Theme toggle --- */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .theme-toggle {
      all: unset;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: 1px solid var(--color-border);
      aspect-ratio: 1 / 1;
      border-radius: 6px;
      cursor: pointer;
      padding: 0.3rem;
      font-size: 1rem;
      line-height: 1;
      color: var(--color-text);
      transition: border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .theme-toggle svg {
      flex-shrink: 0;
      display: block;
      width: 1rem;
      height: 1rem;
    }

    .theme-toggle .theme-dark {
      transform: scale(0.8);
    }

    .theme-toggle:hover {
      border-color: var(--color-green);
    }

    :not([data-theme="dark"]) .theme-toggle .theme-dark {
      display: none;
    }

    [data-theme="dark"] .theme-toggle .theme-light {
      display: none;
    }

    [data-theme="dark"] .theme-toggle .theme-dark {
      display: flex;
    }

    .toast {
      position: fixed;
      bottom: 0;
      left: 50%;
      width: max-content;
      text-align: center;
      background: var(--color-green);
      color: var(--color-bg);
      padding: 1rem 1.5rem 2rem 1.5rem;
      border-radius: 0.5rem;
      transform: translateX(-50%) translateY(100%);
      transition: transform 0.2s var(--easing-overshoot);
      z-index: 100;
    }

    .toast.visible {
      transform: translateX(-50%) translateY(1rem);
    }

    @media (max-width: 480px) {
      :root {
        --font-size: 1rem;
        --padding: 1rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1><em>Tiny</em>Sums</h1>
    <button class="theme-toggle" id="themeToggle" title="Toggle dark mode" aria-label="Toggle dark mode">
      <svg fill="none" class="theme-light" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0"/></svg>
      <svg fill="none" class="theme-dark" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.7 9.7 0 0 1 18 15.75 9.75 9.75 0 0 1 8.25 6c0-1.33.266-2.597.748-3.752A9.75 9.75 0 0 0 3 11.25 9.75 9.75 0 0 0 12.75 21a9.75 9.75 0 0 0 9.002-5.998"/></svg>
    </button>
  </header>

  <main class="editor">
    <div class="input-container">
      <div class="highlight-layer" id="highlight" aria-hidden="true"></div>
      <textarea id="input" spellcheck="false" autocomplete="off" autofocus></textarea>
    </div>
    <div class="output-container" id="output"></div>
  </main>

  <div class="toast" id="toast">Copied!</div>

  <script src="https://unpkg.com/ohm-js@17/dist/ohm.min.js"></script>
  <script type="module" src="scripts/app.js"></script>
</body>
</html>
